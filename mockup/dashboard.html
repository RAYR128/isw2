<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Empresa de Aseos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <header class="bg-blue-600 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Empresa de Aseos</h1>
            <nav>
                <a href="index.html" class="hover:underline">Cerrar Sesion</a>
            </nav>
        </div>
    </header>
    <main class="container mx-auto p-6">
        <h2 class="text-2xl font-bold mb-6">Dashboard de Gestion</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <a href="asignacion.html" class="bg-white p-6 rounded-lg shadow-md hover:shadow-lg transition-shadow">
                <h3 class="text-lg font-semibold mb-2">Volumen de Personal</h3>
                <p class="text-gray-600">Gestionar envio de personal a diferentes lugares</p>

            <a href="contratospersonal.html" class="bg-white p-6 rounded-lg shadow-md hover:shadow-lg transition-shadow">
                <h3 class="text-lg font-semibold mb-2">Contratos de Trabajo</h3>

            </a>
        </div>
        <br>
        <h2 class="text-2xl font-bold mb-6">Administracion</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <a href="contratosejecutivo.html" class="bg-white p-6 rounded-lg shadow-md hover:shadow-lg transition-shadow">
                <h3 class="text-lg font-semibold mb-2">Contratos Ejecutivos</h3>
                <p class="text-gray-600">Contadores, prevencionistas, personal quimico, etc.</p>
            </a>

</html>
